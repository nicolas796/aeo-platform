{% extends "base.html" %}

{% block auth_content %}
<div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg">
    <div class="text-center">
        <i class="fas fa-search-location text-indigo-600 text-4xl mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-900">Register your brand</h2>
        <p class="mt-2 text-gray-600">Start tracking your AEO visibility</p>
    </div>
    
    <form class="mt-8 space-y-6" method="POST" action="{{ url_for('auth.register') }}">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700">First name</label>
                <input id="first_name" name="first_name" type="text" required 
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700">Last name</label>
                <input id="last_name" name="last_name" type="text" required 
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>
        
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
            <input id="email" name="email" type="email" required 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input id="password" name="password" type="password" required minlength="8"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters</p>
        </div>
        
        <div class="border-t pt-4">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Brand Information</h3>
            
            <div class="space-y-4">
                <div>
                    <label for="tenant_name" class="block text-sm font-medium text-gray-700">Brand/Company name</label>
                    <input id="tenant_name" name="tenant_name" type="text" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label for="website_url" class="block text-sm font-medium text-gray-700">Website URL</label>
                    <input id="website_url" name="website_url" type="url" required placeholder="https://example.com"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label for="industry" class="block text-sm font-medium text-gray-700">Industry</label>
                    <select id="industry" name="industry" required
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select industry...</option>
                        <option value="technology">Technology / Software</option>
                        <option value="ecommerce">E-commerce / Retail</option>
                        <option value="services">Professional Services</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="finance">Finance / Fintech</option>
                        <option value="education">Education</option>
                        <option value="general">Other</option>
                    </select>
                </div>
            </div>
        </div>
        
        <button type="submit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Create account
        </button>
    </form>
    
    <div class="text-center mt-4">
        <p class="text-sm text-gray-600">
            Already have an account? 
            <a href="{{ url_for('auth.login') }}" class="font-medium text-indigo-600 hover:text-indigo-500">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
