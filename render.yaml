services:
  - type: web
    name: aeo-platform
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aeo-platform-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: hello@estreamly.com
      - key: BRAVE_API_KEY
        sync: false
      - key: WEEKLY_SCAN_DAY
        value: sunday
      - key: WEEKLY_SCAN_TIME
        value: 02:00
    healthCheckPath: /dashboard
    autoDeploy: true

databases:
  - name: aeo-platform-db
    plan: free
    ipAllowList: []
